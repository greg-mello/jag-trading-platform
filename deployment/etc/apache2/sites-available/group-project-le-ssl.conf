<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName jagtrading.xyz
    ServerAlias www.jagtrading.xyz
    DocumentRoot /srv/group-project/web
    WSGIScriptAlias / /srv/group-project/backend/api/app.wsgi
    <Directory /srv/group-project/web>
        Require all granted
    </Directory>
    <Directory /srv/group-project/backend/api>
        WSGIProcessGroup flaskapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/group-project-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/group-project-ssl-access.log combined
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/jagtrading.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/jagtrading.xyz/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
