<VirtualHost *:80>
    ServerAdmin ubuntu@localhost
    WSGIScriptAlias / /srv/group-project/backend/api/app.wsgi
    <Directory /srv/group-project/backend/api>
        WSGIProcessGroup flaskapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/group-project-error.log
    CustomLog ${APACHE_LOG_DIR}/group-project-access.log combined
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =www.jagtrading.xyz [OR]
    RewriteCond %{SERVER_NAME} =jagtrading.xyz
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
