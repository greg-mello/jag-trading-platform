<!doctype html><html lang="en"><head>  <meta charset="utf-8" />  <meta name="viewport" content="width=device-width, initial-scale=1" />  <title>J.A.G Trading Platform - Login</title>  <link rel="stylesheet" href="css/styles.css" />  <script defer src="js/app.js"></script></head><body>  <header class="topbar">    <div class="topbar-inner">      <div class="brand">J.A.G Trading Platform</div>      <div class="brand brand-logo">        <img src="./img/logo.png" alt="J.A.G Trading Logo" class="logo-img" />      </div>      <div class="page-title">Login</div>      <div class="role-pill" id="rolePill">Guest</div>    </div>  </header>  <div class="app">    <aside class="sidebar">      <nav class="nav">        <a class="nav-item is-active" href="index.html">Login</a>        <a class="nav-item" href="create-account.html">Create Account</a>        <a class="nav-item" href="market.html">Market</a>        <a class="nav-item" href="trade-ticket.html">Trade Ticket</a>        <a class="nav-item" href="open-orders.html">Open Orders</a>        <a class="nav-item" href="portfolio-cash.html">Portfolio &amp; Cash</a>        <a class="nav-item" href="transaction-history.html">Transaction History</a>        <a class="nav-item" href="admin-stocks.html">Admin: Stocks</a>        <a class="nav-item" href="admin-market.html">Admin: Market</a>      </nav>    </aside>    <main class="content">      <section class="panel panel-lg login-watermark">        <div class="panel-header">          <h1 class="panel-title">Sign in</h1>        </div>        <form class="form" id="loginForm" autocomplete="on">          <div class="field">            <label class="label" for="loginInput">Username or Email</label>            <input class="input" id="loginInput" name="loginInput" type="text" placeholder="Enter username or email" required />          </div>          <div class="field">            <label class="label" for="password">Password</label>            <input class="input" id="password" name="password" type="password" placeholder="********" required />          </div>          <div class="actions">            <button class="btn btn-primary" type="submit">Sign in</button>            <a class="btn btn-ghost" href="create-account.html">Create account</a>          </div>          <p class="helper" id="loginHelper"></p>        </form>      </section>    </main>  </div></body></html>
